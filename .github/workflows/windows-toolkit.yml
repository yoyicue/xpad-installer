name: Windows safe-install toolkit

on:
  push:
    paths:
      - '.github/workflows/windows-toolkit.yml'
      - 'windows-toolkit/**'
      - 'tools/package_windows_toolkit.sh'
      - 'tests/test_windows_toolkit.py'
  pull_request:
    paths:
      - '.github/workflows/windows-toolkit.yml'
      - 'windows-toolkit/**'
      - 'tools/package_windows_toolkit.sh'
      - 'tests/test_windows_toolkit.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  classification-tests:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Compile GUI and run toolkit tests
        shell: pwsh
        run: |
          python -m py_compile windows-toolkit/xpad-safe-install-gui.py
          python -m unittest tests.test_windows_toolkit -v
